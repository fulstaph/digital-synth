name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    # paths:
    #   - '!docs/**'
    #   - '!*.md'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Claude Code
        run: |
          brew install anthropics/ccd/claude-code

      - name: Run Claude Code Review
        run: claude --version
