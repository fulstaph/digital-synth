<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300">
  <!-- Axes -->
  <line x1="60" y1="250" x2="660" y2="250" stroke="#d1d5db" stroke-width="1"/>
  <line x1="60" y1="250" x2="60" y2="30" stroke="#d1d5db" stroke-width="1"/>

  <!-- Axis labels -->
  <text x="360" y="290" font-family="sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Time</text>
  <text x="25" y="140" font-family="sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle" transform="rotate(-90,25,140)">Level</text>

  <!-- Stage boundary dashed lines -->
  <line x1="60" y1="250" x2="60" y2="30" stroke="#9ca3af" stroke-width="0.75" stroke-dasharray="4,3"/>
  <line x1="170" y1="250" x2="170" y2="30" stroke="#9ca3af" stroke-width="0.75" stroke-dasharray="4,3"/>
  <line x1="290" y1="250" x2="290" y2="30" stroke="#9ca3af" stroke-width="0.75" stroke-dasharray="4,3"/>
  <line x1="470" y1="250" x2="470" y2="30" stroke="#9ca3af" stroke-width="0.75" stroke-dasharray="4,3"/>
  <line x1="610" y1="250" x2="610" y2="30" stroke="#9ca3af" stroke-width="0.75" stroke-dasharray="4,3"/>

  <!-- Envelope path -->
  <path d="M60,250 Q90,80 170,50 L290,140 L470,140 Q540,140 610,250" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sustain level indicator (dashed horizontal) -->
  <line x1="290" y1="140" x2="470" y2="140" stroke="#2563eb" stroke-width="2.5"/>

  <!-- Key held indicator -->
  <line x1="300" y1="262" x2="460" y2="262" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="380" y="276" font-family="sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">key held</text>

  <!-- Stage labels -->
  <text x="115" y="22" font-family="sans-serif" font-size="13" fill="#374151" text-anchor="middle">Attack</text>
  <text x="230" y="22" font-family="sans-serif" font-size="13" fill="#374151" text-anchor="middle">Decay</text>
  <text x="380" y="22" font-family="sans-serif" font-size="13" fill="#374151" text-anchor="middle">Sustain</text>
  <text x="540" y="22" font-family="sans-serif" font-size="13" fill="#374151" text-anchor="middle">Release</text>

  <!-- Note On / Note Off annotations -->
  <text x="60" y="242" font-family="sans-serif" font-size="11" fill="#374151" text-anchor="middle">Note On</text>
  <path d="M60,244 L60,250" stroke="#374151" stroke-width="1"/>
  <text x="470" y="242" font-family="sans-serif" font-size="11" fill="#374151" text-anchor="middle">Note Off</text>
  <path d="M470,244 L470,250" stroke="#374151" stroke-width="1"/>
</svg>
