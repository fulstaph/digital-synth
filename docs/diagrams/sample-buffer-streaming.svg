<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <!-- Title -->
  <text x="380" y="26" font-family="sans-serif" font-size="16" font-weight="bold" fill="#374151" text-anchor="middle">Sampling And Buffer-Based Audio Streaming</text>

  <!-- ===== Top: Continuous waveform with sample points ===== -->
  <text x="20" y="68" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">Continuous signal</text>

  <!-- Axis line -->
  <line x1="60" y1="120" x2="720" y2="120" stroke="#d1d5db" stroke-width="0.5"/>

  <!-- Continuous sine wave (light, behind samples) -->
