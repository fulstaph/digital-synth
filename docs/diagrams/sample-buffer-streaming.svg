  <!-- Sample points (discrete dots) -->
  <!-- Cycle 1 -->
  <circle cx="60" cy="120" r="4" fill="#2563eb"/>
  <circle cx="88" cy="86" r="4" fill="#2563eb"/>
  <circle cx="115" cy="72" r="4" fill="#2563eb"/>
  <circle cx="143" cy="100" r="4" fill="#2563eb"/>
  <circle cx="170" cy="162" r="4" fill="#2563eb"/>
  <circle cx="198" cy="150" r="4" fill="#2563eb"/>
  <!-- Cycle 2 -->
  <circle cx="225" cy="78" r="4" fill="#2563eb"/>
  <circle cx="253" cy="100" r="4" fill="#2563eb"/>
  <circle cx="280" cy="165" r="4" fill="#2563eb"/>
  <circle cx="308" cy="130" r="4" fill="#2563eb"/>
  <circle cx="335" cy="72" r="4" fill="#2563eb"/>
  <circle cx="363" cy="130" r="4" fill="#2563eb"/>
  <!-- Cycle 3 -->
  <circle cx="390" cy="168" r="4" fill="#2563eb"/>
  <circle cx="418" cy="110" r="4" fill="#2563eb"/>
  <circle cx="445" cy="72" r="4" fill="#2563eb"/>
  <circle cx="473" cy="120" r="4" fill="#2563eb"/>
  <circle cx="500" cy="168" r="4" fill="#2563eb"/>
  <circle cx="528" cy="120" r="4" fill="#2563eb"/>
  <!-- Cycle 4 -->
  <circle cx="555" cy="72" r="4" fill="#2563eb"/>
  <circle cx="583" cy="120" r="4" fill="#2563eb"/>
  <circle cx="610" cy="168" r="4" fill="#2563eb"/>
  <circle cx="638" cy="120" r="4" fill="#2563eb"/>
  <circle cx="665" cy="72" r="4" fill="#2563eb"/>
  <circle cx="693" cy="100" r="4" fill="#2563eb"/>

  <!-- Stem lines from dots to axis -->
  <line x1="88" y1="86" x2="88" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="115" y1="72" x2="115" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="143" y1="100" x2="143" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="170" y1="162" x2="170" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="198" y1="150" x2="198" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="225" y1="78" x2="225" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="253" y1="100" x2="253" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="280" y1="165" x2="280" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="308" y1="130" x2="308" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="335" y1="72" x2="335" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="363" y1="130" x2="363" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="390" y1="168" x2="390" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="418" y1="110" x2="418" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="445" y1="72" x2="445" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="473" y1="120" x2="473" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="500" y1="168" x2="500" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="528" y1="120" x2="528" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="555" y1="72" x2="555" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="583" y1="120" x2="583" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="610" y1="168" x2="610" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="638" y1="120" x2="638" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="665" y1="72" x2="665" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="693" y1="100" x2="693" y2="120" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Sample annotation -->
  <text x="720" y="82" font-family="sans-serif" font-size="10" fill="#2563eb">samples</text>
  <text x="720" y="95" font-family="sans-serif" font-size="9" fill="#6b7280">(discrete</text>
  <text x="720" y="106" font-family="sans-serif" font-size="9" fill="#6b7280">values)</text>

  <!-- ===== Middle: Buffer grouping ===== -->
  <text x="20" y="210" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">Grouped into buffers</text>

  <!-- Buffer 1 -->
  <rect x="60" y="225" width="155" height="40" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="137" y="249" font-family="sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">Buffer 1</text>
  <!-- sample ticks inside -->
  <line x1="88" y1="230" x2="88" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="115" y1="230" x2="115" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="143" y1="230" x2="143" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="170" y1="230" x2="170" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="198" y1="230" x2="198" y2="260" stroke="#93c5fd" stroke-width="0.5"/>

  <!-- Buffer 2 -->
  <rect x="225" y="225" width="155" height="40" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="302" y="249" font-family="sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">Buffer 2</text>
  <line x1="253" y1="230" x2="253" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="280" y1="230" x2="280" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="308" y1="230" x2="308" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="335" y1="230" x2="335" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="363" y1="230" x2="363" y2="260" stroke="#93c5fd" stroke-width="0.5"/>

  <!-- Buffer 3 -->
  <rect x="390" y="225" width="155" height="40" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="467" y="249" font-family="sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">Buffer 3</text>
  <line x1="418" y1="230" x2="418" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="445" y1="230" x2="445" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="473" y1="230" x2="473" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="500" y1="230" x2="500" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="528" y1="230" x2="528" y2="260" stroke="#93c5fd" stroke-width="0.5"/>

  <!-- Buffer 4 -->
  <rect x="555" y="225" width="155" height="40" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="632" y="249" font-family="sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">Buffer 4</text>
  <line x1="583" y1="230" x2="583" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="610" y1="230" x2="610" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="638" y1="230" x2="638" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="665" y1="230" x2="665" y2="260" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="693" y1="230" x2="693" y2="260" stroke="#93c5fd" stroke-width="0.5"/>

  <!-- N samples label -->
  <line x1="60" y1="275" x2="215" y2="275" stroke="#6b7280" stroke-width="0.8"/>
  <line x1="60" y1="272" x2="60" y2="278" stroke="#6b7280" stroke-width="0.8"/>
  <line x1="215" y1="272" x2="215" y2="278" stroke="#6b7280" stroke-width="0.8"/>
  <text x="137" y="287" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">N samples per buffer</text>

  <!-- ===== Bottom: Streaming to output ===== -->
  <text x="20" y="318" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">Streamed to output</text>

  <defs>
    <marker id="arw" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Timeline arrow -->
  <line x1="60" y1="350" x2="620" y2="350" stroke="#6b7280" stroke-width="1" marker-end="url(#arw)"/>
  <text x="640" y="354" font-family="sans-serif" font-size="10" fill="#6b7280">time</text>

  <!-- Buffer blocks on timeline -->
  <rect x="80" y="336" width="100" height="28" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="130" y="354" font-family="sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">B1</text>

  <rect x="190" y="336" width="100" height="28" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="240" y="354" font-family="sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">B2</text>

  <rect x="300" y="336" width="100" height="28" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="354" font-family="sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">B3</text>

  <rect x="410" y="336" width="100" height="28" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="460" y="354" font-family="sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">B4</text>

  <!-- Deadline annotation -->
  <line x1="190" y1="330" x2="190" y2="370" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="300" y1="330" x2="300" y2="370" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="410" y1="330" x2="410" y2="370" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="350" y="379" font-family="sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">each buffer must be ready before its deadline</text>
</svg>