<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <style>
    text { font-family: sans-serif; fill: #374151; }
    .box-label { font-size: 12px; text-anchor: middle; dominant-baseline: central; }
    .heading { font-size: 14px; font-weight: bold; text-anchor: middle; fill: #1f2937; }
    .routing-label { font-size: 10px; fill: #6b7280; font-style: italic; }
    .source-box { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; rx: 4; ry: 4; }
    .dest-box { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 4; ry: 4; }
    .grid-line { stroke: #f3f4f6; stroke-width: 0.5; }
    .dot-inactive { fill: #e5e7eb; r: 3; }
    .dot-active { fill: #2563eb; }
    .conn-thick { stroke: #6b7280; stroke-width: 2.5; fill: none; }
    .conn-medium { stroke: #6b7280; stroke-width: 1.8; fill: none; }
    .conn-thin { stroke: #6b7280; stroke-width: 1; fill: none; stroke-dasharray: 4,2; }
  </style>

  <!-- Column headings -->
  <text x="80" y="24" class="heading">Sources</text>
  <text x="620" y="24" class="heading">Destinations</text>
  <text x="350" y="24" class="heading">Routing Matrix</text>

  <!-- ========== SOURCE BOXES (left column) ========== -->
  <!-- 6 sources, spaced vertically from y=42 to y=372, spacing ~56px -->
  <!-- Box width=120, height=30, x=20..140 -->
  <rect x="20" y="46" width="120" height="30" class="source-box"/>
  <text x="80" y="61" class="box-label">Envelope 1</text>

  <rect x="20" y="102" width="120" height="30" class="source-box"/>
  <text x="80" y="117" class="box-label">Envelope 2</text>

  <rect x="20" y="158" width="120" height="30" class="source-box"/>
  <text x="80" y="173" class="box-label">LFO 1</text>

  <rect x="20" y="214" width="120" height="30" class="source-box"/>
  <text x="80" y="229" class="box-label">LFO 2</text>

  <rect x="20" y="270" width="120" height="30" class="source-box"/>
  <text x="80" y="285" class="box-label">Velocity</text>

  <rect x="20" y="326" width="120" height="30" class="source-box"/>
  <text x="80" y="341" class="box-label">Mod Wheel</text>

  <!-- ========== DESTINATION BOXES (right column) ========== -->
  <!-- 7 destinations, spaced from y=38 to y=370, spacing ~48px -->
  <!-- Box width=120, height=28, x=560..680 -->
  <rect x="560" y="40" width="120" height="28" class="dest-box"/>
  <text x="620" y="54" class="box-label">Pitch</text>

  <rect x="560" y="88" width="120" height="28" class="dest-box"/>
  <text x="620" y="102" class="box-label">Filter Cutoff</text>

  <rect x="560" y="136" width="120" height="28" class="dest-box"/>
  <text x="620" y="150" class="box-label">Resonance</text>

  <rect x="560" y="184" width="120" height="28" class="dest-box"/>
  <text x="620" y="198" class="box-label">Amp Level</text>

  <rect x="560" y="232" width="120" height="28" class="dest-box"/>
  <text x="620" y="246" class="box-label">Pan</text>

  <rect x="560" y="280" width="120" height="28" class="dest-box"/>
  <text x="620" y="294" class="box-label">Effect Mix</text>

  <rect x="560" y="328" width="120" height="28" class="dest-box"/>
  <text x="620" y="342" class="box-label">Wavetable Pos</text>

  <!-- ========== MATRIX GRID AREA ========== -->
  <!-- Grid area: x=185..515, covers source rows x destination columns -->
  <!-- Source row centers: 61, 117, 173, 229, 285, 341 -->
  <!-- Dest col positions (7 cols across 185..515): 208.6, 255.7, 302.9, 350, 397.1, 444.3, 491.4 -->

  <!-- Vertical grid lines (destination columns) -->
  <line x1="209" y1="38" x2="209" y2="360" class="grid-line"/>
  <line x1="256" y1="38" x2="256" y2="360" class="grid-line"/>
  <line x1="303" y1="38" x2="303" y2="360" class="grid-line"/>
  <line x1="350" y1="38" x2="350" y2="360" class="grid-line"/>
  <line x1="397" y1="38" x2="397" y2="360" class="grid-line"/>
  <line x1="444" y1="38" x2="444" y2="360" class="grid-line"/>
  <line x1="491" y1="38" x2="491" y2="360" class="grid-line"/>

  <!-- Horizontal grid lines (source rows) -->
  <line x1="185" y1="61" x2="515" y2="61" class="grid-line"/>
  <line x1="185" y1="117" x2="515" y2="117" class="grid-line"/>
  <line x1="185" y1="173" x2="515" y2="173" class="grid-line"/>
  <line x1="185" y1="229" x2="515" y2="229" class="grid-line"/>
  <line x1="185" y1="285" x2="515" y2="285" class="grid-line"/>
  <line x1="185" y1="341" x2="515" y2="341" class="grid-line"/>

  <!-- Inactive dots at all intersections (6 sources x 7 destinations = 42) -->
  <!-- Row: Envelope 1 (y=61) -->
  <circle cx="209" cy="61" r="3" class="dot-inactive"/>
  <circle cx="256" cy="61" r="3" class="dot-inactive"/>
  <circle cx="303" cy="61" r="3" class="dot-inactive"/>
  <circle cx="397" cy="61" r="3" class="dot-inactive"/>
  <circle cx="444" cy="61" r="3" class="dot-inactive"/>
  <circle cx="491" cy="61" r="3" class="dot-inactive"/>
  <!-- Row: Envelope 2 (y=117) -->
  <circle cx="209" cy="117" r="3" class="dot-inactive"/>
  <circle cx="303" cy="117" r="3" class="dot-inactive"/>
  <circle cx="350" cy="117" r="3" class="dot-inactive"/>
  <circle cx="397" cy="117" r="3" class="dot-inactive"/>
  <circle cx="444" cy="117" r="3" class="dot-inactive"/>
  <circle cx="491" cy="117" r="3" class="dot-inactive"/>
  <!-- Row: LFO 1 (y=173) -->
  <circle cx="256" cy="173" r="3" class="dot-inactive"/>
  <circle cx="303" cy="173" r="3" class="dot-inactive"/>
  <circle cx="350" cy="173" r="3" class="dot-inactive"/>
  <circle cx="397" cy="173" r="3" class="dot-inactive"/>
  <circle cx="444" cy="173" r="3" class="dot-inactive"/>
  <circle cx="491" cy="173" r="3" class="dot-inactive"/>
  <!-- Row: LFO 2 (y=229) -->
  <circle cx="209" cy="229" r="3" class="dot-inactive"/>
  <circle cx="256" cy="229" r="3" class="dot-inactive"/>
  <circle cx="303" cy="229" r="3" class="dot-inactive"/>
  <circle cx="350" cy="229" r="3" class="dot-inactive"/>
  <circle cx="444" cy="229" r="3" class="dot-inactive"/>
  <circle cx="491" cy="229" r="3" class="dot-inactive"/>
  <!-- Row: Velocity (y=285) -->
  <circle cx="209" cy="285" r="3" class="dot-inactive"/>
  <circle cx="303" cy="285" r="3" class="dot-inactive"/>
  <circle cx="350" cy="285" r="3" class="dot-inactive"/>
  <circle cx="397" cy="285" r="3" class="dot-inactive"/>
  <circle cx="444" cy="285" r="3" class="dot-inactive"/>
  <circle cx="491" cy="285" r="3" class="dot-inactive"/>
  <!-- Row: Mod Wheel (y=341) -->
  <circle cx="209" cy="341" r="3" class="dot-inactive"/>
  <circle cx="256" cy="341" r="3" class="dot-inactive"/>
  <circle cx="303" cy="341" r="3" class="dot-inactive"/>
  <circle cx="350" cy="341" r="3" class="dot-inactive"/>
  <circle cx="397" cy="341" r="3" class="dot-inactive"/>
  <circle cx="491" cy="341" r="3" class="dot-inactive"/>

  <!-- ========== ACTIVE ROUTINGS ========== -->

  <!-- Envelope 1 -> Amp Level (thick) -->
  <!-- Source y=61, dest col=350 (Amp Level) -->
  <circle cx="350" cy="61" r="5" class="dot-active"/>
  <path d="M140,61 L350,61 L350,198 L560,198" class="conn-thick"/>

  <!-- Envelope 2 -> Filter Cutoff (thick) -->
  <!-- Source y=117, dest col=256 (Filter Cutoff) -->
  <circle cx="256" cy="117" r="5" class="dot-active"/>
  <path d="M140,117 L256,117 L256,102 L560,102" class="conn-thick"/>

  <!-- LFO 1 -> Pitch (medium, labeled "Vibrato") -->
  <!-- Source y=173, dest col=209 (Pitch) -->
  <circle cx="209" cy="173" r="5" class="dot-active"/>
  <path d="M140,173 L209,173 L209,54 L560,54" class="conn-medium"/>
  <text x="220" y="120" class="routing-label">Vibrato</text>

  <!-- LFO 2 -> Pan (medium, labeled "Auto-Pan") -->
  <!-- Source y=229, dest col=397 (Pan) -->
  <circle cx="397" cy="229" r="5" class="dot-active"/>
  <path d="M140,229 L397,229 L397,246 L560,246" class="conn-medium"/>
  <text x="408" y="240" class="routing-label">Auto-Pan</text>

  <!-- Velocity -> Filter Cutoff (thin) -->
  <!-- Source y=285, dest col=256 (Filter Cutoff) -->
  <circle cx="256" cy="285" r="5" class="dot-active"/>
  <path d="M140,285 L256,285 L256,102 L560,102" class="conn-thin"/>

  <!-- Mod Wheel -> Effect Mix (thin) -->
  <!-- Source y=341, dest col=444 (Effect Mix) -->
  <circle cx="444" cy="341" r="5" class="dot-active"/>
  <path d="M140,341 L444,341 L444,294 L560,294" class="conn-thin"/>

  <!-- Legend -->
  <line x1="200" y1="385" x2="230" y2="385" class="conn-thick"/>
  <text x="235" y="389" font-family="sans-serif" font-size="10" fill="#6b7280">Primary</text>
  <line x1="290" y1="385" x2="320" y2="385" class="conn-medium"/>
  <text x="325" y="389" font-family="sans-serif" font-size="10" fill="#6b7280">Modulation</text>
  <line x1="400" y1="385" x2="430" y2="385" class="conn-thin"/>
  <text x="435" y="389" font-family="sans-serif" font-size="10" fill="#6b7280">Secondary</text>
</svg>
