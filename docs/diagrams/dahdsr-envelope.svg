<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300">
  <!-- Axes -->
  <line x1="50" y1="250" x2="670" y2="250" stroke="#d1d5db" stroke-width="1"/>
  <line x1="50" y1="250" x2="50" y2="30" stroke="#d1d5db" stroke-width="1"/>

  <!-- Axis labels -->
  <text x="360" y="290" font-family="sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Time</text>
  <text x="18" y="140" font-family="sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle" transform="rotate(-90,18,140)">Level</text>

  <!-- Stage boundary dashed lines -->
  <line x1="50" y1="250" x2="50" y2="30" stroke="#9ca3af" stroke-width="0.75" stroke-dasharray="4,3"/>
  <line x1="120" y1="250" x2="120" y2="30" stroke="#9ca3af" stroke-width="0.75" stroke-dasharray="4,3"/>
  <line x1="220" y1="250" x2="220" y2="30" stroke="#9ca3af" stroke-width="0.75" stroke-dasharray="4,3"/>
  <line x1="290" y1="250" x2="290" y2="30" stroke="#9ca3af" stroke-width="0.75" stroke-dasharray="4,3"/>
  <line x1="380" y1="250" x2="380" y2="30" stroke="#9ca3af" stroke-width="0.75" stroke-dasharray="4,3"/>
  <line x1="510" y1="250" x2="510" y2="30" stroke="#9ca3af" stroke-width="0.75" stroke-dasharray="4,3"/>
  <line x1="640" y1="250" x2="640" y2="30" stroke="#9ca3af" stroke-width="0.75" stroke-dasharray="4,3"/>

  <!-- Envelope path -->
  <!-- Delay: flat at zero -->
  <!-- Attack: rise to peak -->
  <!-- Hold: flat at peak -->
  <!-- Decay: fall to sustain -->
  <!-- Sustain: flat at sustain level -->
  <!-- Release: fall to zero -->
  <path d="M50,250 L120,250 Q145,80 220,50 L290,50 L380,145 L510,145 Q575,145 640,250" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Key held indicator -->
  <line x1="390" y1="262" x2="500" y2="262" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="445" y="276" font-family="sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">key held</text>

  <!-- Stage labels -->
  <text x="85" y="22" font-family="sans-serif" font-size="13" fill="#374151" text-anchor="middle">Delay</text>
  <text x="170" y="22" font-family="sans-serif" font-size="13" fill="#374151" text-anchor="middle">Attack</text>
  <text x="255" y="22" font-family="sans-serif" font-size="13" fill="#374151" text-anchor="middle">Hold</text>
  <text x="335" y="22" font-family="sans-serif" font-size="13" fill="#374151" text-anchor="middle">Decay</text>
  <text x="445" y="22" font-family="sans-serif" font-size="13" fill="#374151" text-anchor="middle">Sustain</text>
  <text x="575" y="22" font-family="sans-serif" font-size="13" fill="#374151" text-anchor="middle">Release</text>

  <!-- Note On / Note Off annotations -->
  <text x="50" y="242" font-family="sans-serif" font-size="11" fill="#374151" text-anchor="middle">Note On</text>
  <path d="M50,244 L50,250" stroke="#374151" stroke-width="1"/>
  <text x="510" y="242" font-family="sans-serif" font-size="11" fill="#374151" text-anchor="middle">Note Off</text>
  <path d="M510,244 L510,250" stroke="#374151" stroke-width="1"/>
</svg>
