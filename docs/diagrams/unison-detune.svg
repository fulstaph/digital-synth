<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">

  <!-- ==================== Plot 1: Linear Distribution ==================== -->
  <text x="30" y="62" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Linear</text>
  <text x="30" y="76" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Distribution</text>

  <!-- Pitch axis line -->
  <line x1="150" y1="68" x2="660" y2="68" stroke="#d1d5db" stroke-width="1"/>

  <!-- Center pitch dashed line -->
  <line x1="405" y1="42" x2="405" y2="94" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="405" y="36" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Center Pitch</text>

  <!-- Flat / Sharp labels -->
  <text x="160" y="88" font-family="sans-serif" font-size="10" fill="#6b7280">&#x2190; Flat</text>
  <text x="630" y="88" font-family="sans-serif" font-size="10" fill="#6b7280">Sharp &#x2192;</text>

  <!-- 7 voices equally spaced: positions at 195, 230, 265, 405, 545, 580, 615 -->
  <!-- Evenly from 195 to 615, step = 70 -->
  <circle cx="195" cy="68" r="6" fill="#2563eb"/>
  <circle cx="265" cy="68" r="6" fill="#2563eb"/>
  <circle cx="335" cy="68" r="6" fill="#2563eb"/>
  <circle cx="405" cy="68" r="6" fill="#2563eb"/>
  <circle cx="475" cy="68" r="6" fill="#2563eb"/>
  <circle cx="545" cy="68" r="6" fill="#2563eb"/>
  <circle cx="615" cy="68" r="6" fill="#2563eb"/>

  <!-- ==================== Plot 2: Center-Weighted ==================== -->
  <text x="30" y="192" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Center-</text>
  <text x="30" y="206" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Weighted</text>

  <!-- Pitch axis line -->
  <line x1="150" y1="198" x2="660" y2="198" stroke="#d1d5db" stroke-width="1"/>

  <!-- Center pitch dashed line -->
  <line x1="405" y1="172" x2="405" y2="224" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="405" y="166" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Center Pitch</text>

  <!-- Flat / Sharp labels -->
  <text x="160" y="218" font-family="sans-serif" font-size="10" fill="#6b7280">&#x2190; Flat</text>
  <text x="630" y="218" font-family="sans-serif" font-size="10" fill="#6b7280">Sharp &#x2192;</text>

  <!-- 7 voices clustered near center: sparse at edges -->
  <!-- Positions: 210, 340, 380, 405, 430, 470, 600 -->
  <circle cx="210" cy="198" r="6" fill="#2563eb"/>
  <circle cx="340" cy="198" r="6" fill="#2563eb"/>
  <circle cx="380" cy="198" r="6" fill="#2563eb"/>
  <circle cx="405" cy="198" r="6" fill="#2563eb"/>
  <circle cx="430" cy="198" r="6" fill="#2563eb"/>
  <circle cx="470" cy="198" r="6" fill="#2563eb"/>
  <circle cx="600" cy="198" r="6" fill="#2563eb"/>

  <!-- ==================== Plot 3: Edge-Weighted (Exponential) ==================== -->
  <text x="30" y="322" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Edge-Weighted</text>
  <text x="30" y="336" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">(Exponential)</text>

  <!-- Pitch axis line -->
  <line x1="150" y1="328" x2="660" y2="328" stroke="#d1d5db" stroke-width="1"/>

  <!-- Center pitch dashed line -->
  <line x1="405" y1="302" x2="405" y2="354" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="405" y="296" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Center Pitch</text>

  <!-- Flat / Sharp labels -->
  <text x="160" y="348" font-family="sans-serif" font-size="10" fill="#6b7280">&#x2190; Flat</text>
  <text x="630" y="348" font-family="sans-serif" font-size="10" fill="#6b7280">Sharp &#x2192;</text>

  <!-- 7 voices clustered at edges, sparse near center: -->
  <!-- Positions: 195, 220, 260, 405, 550, 590, 615 -->
  <circle cx="195" cy="328" r="6" fill="#2563eb"/>
  <circle cx="220" cy="328" r="6" fill="#2563eb"/>
  <circle cx="260" cy="328" r="6" fill="#2563eb"/>
  <circle cx="405" cy="328" r="6" fill="#2563eb"/>
  <circle cx="550" cy="328" r="6" fill="#2563eb"/>
  <circle cx="590" cy="328" r="6" fill="#2563eb"/>
  <circle cx="615" cy="328" r="6" fill="#2563eb"/>
</svg>